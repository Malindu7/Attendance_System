<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Attendance — {{ subject }}</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Outfit',sans-serif; min-height:100vh; background:linear-gradient(135deg,#0f0c29 0%,#1a1a6e 45%,#24243e 75%,#0d4b8c 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 20px; position:relative; }
.o1,.o2 { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; }
.o1 { width:500px;height:500px;background:radial-gradient(circle,#7c3aed,transparent);opacity:.28;top:-150px;left:-150px; }
.o2 { width:420px;height:420px;background:radial-gradient(circle,#0891b2,transparent);opacity:.28;bottom:-120px;right:-120px; }
.page { position:relative; z-index:1; width:100%; max-width:820px; animation:up .5s ease both; }
@keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.topbar { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:12px; }
.topbar h1 { font-size:22px; font-weight:800; color:white; }
.pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
.pill { padding:5px 14px; border-radius:50px; font-size:12px; font-weight:600; }
.pill-course { background:rgba(124,58,237,.2); border:1px solid rgba(124,58,237,.4); color:#c4b5fd; }
.pill-subj   { background:rgba(0,229,255,.12); border:1px solid rgba(0,229,255,.3); color:#00e5ff; }
.pill-live   { background:rgba(16,185,129,.15); border:1px solid rgba(16,185,129,.35); color:#10b981; display:flex; align-items:center; gap:6px; }
.dot { width:7px;height:7px;background:#10b981;border-radius:50%;animation:blink 1.5s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.cam { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); backdrop-filter:blur(20px); border-radius:20px; overflow:hidden; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.4); }
.cam img { display:block; width:100%; max-height:480px; object-fit:cover; }

/* Scan bar */
.scan { position:absolute;top:0;left:0;right:0;height:3px; background:linear-gradient(90deg,transparent,#00e5ff,transparent); animation:scan 3s ease-in-out infinite; pointer-events:none; }
@keyframes scan{0%{top:0;opacity:1}85%{top:calc(100% - 3px);opacity:1}100%{top:calc(100% - 3px);opacity:0}}

/* Corner brackets */
.c { position:absolute;width:22px;height:22px;pointer-events:none; }
.tl{top:14px;left:14px;border-top:2px solid #00e5ff;border-left:2px solid #00e5ff;}
.tr{top:14px;right:14px;border-top:2px solid #00e5ff;border-right:2px solid #00e5ff;}
.bl{bottom:14px;left:14px;border-bottom:2px solid #00e5ff;border-left:2px solid #00e5ff;}
.br{bottom:14px;right:14px;border-bottom:2px solid #00e5ff;border-right:2px solid #00e5ff;}

.cam-info { position:absolute;top:14px;left:50%;transform:translateX(-50%); background:rgba(0,0,0,.55);backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.15);border-radius:50px; padding:5px 15px;font-size:11px;color:rgba(255,255,255,.75); display:flex;align-items:center;gap:7px;white-space:nowrap; }
.rec { width:7px;height:7px;background:#ef4444;border-radius:50%;animation:blink 1s infinite; }

.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:14px; }
.stat { background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(12px);border-radius:14px;padding:14px 16px;text-align:center; }
.stat .ic { font-size:20px; margin-bottom:5px; }
.stat .lb { font-size:12px;color:rgba(255,255,255,.45); }
.stat .vl { font-size:13px;color:white;font-weight:600;margin-top:2px; }

.back { display:block;text-align:center;margin-top:20px;color:rgba(255,255,255,.4);text-decoration:none;font-size:13px;transition:color .2s; }
.back:hover { color:#00e5ff; }
</style>
</head>
<body>
<div class="o1"></div><div class="o2"></div>
<div class="page">

  <div class="topbar">
    <div>
      <h1>🎓 Live Face Verification</h1>
      <div class="pills">
        <span class="pill pill-course">⚙️ {{ course }}</span>
        <span class="pill pill-subj">📚 {{ subject }}</span>
        <span class="pill pill-live"><div class="dot"></div> LIVE</span>
      </div>
    </div>
  </div>

  <div class="cam">
    <img src="{{ url_for('verify_feed', subject=subject, course=course) }}" alt="Live Feed">
    <div class="scan"></div>
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="cam-info"><div class="rec"></div>HOG Detection · ResNet-34 · Tolerance 0.50</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="ic">🟢</div><div class="lb">Verified</div><div class="vl">Green box + name</div></div>
    <div class="stat"><div class="ic">🔴</div><div class="lb">Unknown / Wrong course</div><div class="vl">Red/blue box</div></div>
    <div class="stat"><div class="ic">✅</div><div class="lb">Duplicate guard</div><div class="vl">Once per subject/day</div></div>
  </div>

  <a href="/" class="back">← Back to Home</a>
</div>
</body>
</html>
